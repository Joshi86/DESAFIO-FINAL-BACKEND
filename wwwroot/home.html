<!DOCTYPE html>
<html lang="pt-BR">
<head>
<title>Index</title>
<meta charset="UTF-8">
  
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    .card {
        border-radius: 16px;
    }

    .btn {
        border-radius: 10px;
    }

    .modal-content {
        border-radius: 16px;
    }

    table tbody tr {
        transition: background-color 0.2s;
    }

        table tbody tr:hover {
            background-color: #f1f3f5;
        }
</style>

</head>

<body style="background-color: #f4f6f9;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">

            <span class="navbar-brand fw-bold">
                🎓 Escola do Joshi
            </span>

            <button class="btn btn-light btn-sm" onclick="logout()">
                Sair
            </button>

        </div>
    </nav>

    <!-- LISTA -->

    <div class="container py-5">

        <div class="card shadow border-0">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2 class="mb-0">
                        Lista de Alunos
                    </h2>

                    <div>
                        <button class="btn btn-primary me-2"
                                onclick="abrirFormulario()">

                            + Novo Aluno
                        </button>

                        <button class="btn btn-secondary"
                                onclick="abrirDisciplina()">

                            + Disciplina
                        </button>
                    </div>

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Nascimento</th>
                                <th width="320">Ações</th>
                            </tr>

                        </thead>

                        <tbody id="tabelaAlunos"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- Modal -->

    <div class="modal fade" id="modalDisciplina">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">

                <div class="modal-header">
                    <h5 class="modal-title">Nova Disciplina</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" id="disciplinaNome" class="form-control mb-2" placeholder="Nome">
                    <input type="number" id="cargaHoraria" class="form-control" placeholder="Carga Horária">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarDisciplina()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAluno" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">

                <div class="modal-header">
                    <h5 class="modal-title">Aluno</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="alunoId">

                    <div class="mb-2">
                        <label>Nome</label>
                        <input type="text" id="nome" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>CPF</label>
                        <input type="text" id="cpf" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>Data Nascimento</label>
                        <input type="date" id="dataNascimento" class="form-control">
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarAluno()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNota">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">

                <div class="modal-header">
                    <h5 class="modal-title">Lançar Nota</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="alunoNotaId">

                    <div class="mb-2">
                        <label>Disciplina</label>
                        <select id="disciplinaSelect" class="form-control"></select>
                    </div>

                    <div class="mb-2">
                        <label>Nota</label>
                        <input type="number" id="nota" class="form-control">
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarNota()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalVerNotas">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">

                <div class="modal-header">
                    <h5 class="modal-title">Notas do Aluno</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Disciplina</th>
                                <th>Nota</th>
                                <th>Situação</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaNotas"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
