<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Notas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

        <a class="navbar-brand" href="home.html">
            🎓 SchoolManager
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="alunos.html">Alunos</a>
            <a class="nav-link" href="professores.html">Professores</a>
            <a class="nav-link" href="disciplinas.html">Disciplinas</a>
            <a class="nav-link active" href="notas.html">Notas</a>

        </div>

        <div class="ms-auto">
            <button class="btn btn-danger" onclick="logout()">
                Logout
            </button>
        </div>

    </nav>

    <!-- CONTEÚDO -->
    <div class="container py-5">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2 class="fw-bold mb-0">Gestão de Notas</h2>

            <button id="btnNovaNota"
                    class="btn btn-primary"
                    onclick="abrirModalNota()">
                Nova Nota
            </button>

        </div>

        <!-- TABELA -->
        <div class="card home-card border-0">

            <div class="card-body p-4">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">
                            <tr>
                                <th>Aluno</th>
                                <th>Disciplina</th>
                                <th>Nota</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="tabelaNotas"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- MODAL NOTA -->
    <div class="modal fade" id="modalNota" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content border-0 shadow-lg">

                <div class="modal-header">
                    <h5 class="modal-title">Nova Nota</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="alunoNotaId">

                    <div class="mb-3">

                        <label class="form-label">Aluno</label>

                        <select id="alunoSelect" class="form-control"></select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Disciplina</label>

                        <select id="disciplinaSelect" class="form-control"></select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Nota</label>

                        <input type="number"
                               id="valorNota"
                               class="form-control"
                               placeholder="0 a 10"
                               step="0.1"
                               min="0"
                               max="10">

                        <div class="invalid-feedback">
                            Informe uma nota válida entre 0 e 10
                        </div>

                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-success"
                            onclick="salvarNota()">
                        Salvar
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- SCRIPTS -->
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "login.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="notas.js"></script>

    <!-- LOADING -->
    <div id="loadingScreen" class="loading-screen d-none">

        <div class="text-center">

            <div class="spinner-border text-light" role="status"></div>

            <p class="mt-3 text-light">
                Carregando...
            </p>

        </div>

    </div>
</body>

</html>
