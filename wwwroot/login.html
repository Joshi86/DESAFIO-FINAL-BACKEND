<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <script>
        if (localStorage.getItem("token")) {
            window.location.href = "home.html";
        }
    </script>

    <div class="d-flex flex-column align-items-center">

        <div class="text-center mb-4">

            <h1 class="display-3">🎓</h1>

            <h3 class="fw-bold">
                🎓 SchoolManager
            </h3>

        </div>

        <div class="card shadow p-4 border-0" style="width: 350px; border-radius: 18px;">

            <h4 class="text-center mb-4">Login</h4>

            <form onsubmit="event.preventDefault(); login();">

                <div class="mb-3">
                    <label class="form-label">Usuário</label>

                    <input type="text"
                           id="usuario"
                           class="form-control"
                           placeholder="Digite seu usuário">
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>

                    <input type="password"
                           id="senha"
                           class="form-control"
                           placeholder="Digite sua senha">
                </div>

                <button type="submit"
                        class="btn btn-primary w-100">
                    Entrar
                </button>

                <p class="text-center mt-3">
                    Não tem conta?
                    <a href="#" onclick="mostrarCadastro()">
                        Cadastrar
                    </a>
                </p>

                <p id="erro" class="text-danger text-center mt-3"></p>

            </form>

        </div>

    </div>

    <div class="modal fade" id="modalCadastro" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content border-0 shadow-lg"
                 style="border-radius: 18px;">

                <div class="modal-header border-0 pb-0">

                    <h5 class="modal-title fw-bold">
                        Criar Conta
                    </h5>

                    <button class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body px-4 pb-4">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Usuário
                        </label>

                        <input type="text"
                               id="novoUsuario"
                               class="form-control"
                               placeholder="Digite seu usuário">

                        <div class="invalid-feedback">
                            Digite um usuário válido.
                        </div>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Senha
                        </label>

                        <input type="password"
                               id="novaSenha"
                               class="form-control"
                               placeholder="Digite sua senha">

                        <div class="invalid-feedback">
                            Digite uma senha válida.
                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Tipo de Conta
                        </label>

                        <select id="role"
                                class="form-select">

                            <option value="Aluno">
                                Aluno
                            </option>

                            <option value="Professor">
                                Professor
                            </option>

                            <option value="Admin">
                                Admin
                            </option>

                        </select>

                    </div>

                    <div class="form-check form-check-custom rounded p-3 bg-light d-flex align-items-start gap-2">

                        <input class="form-check-input"
                               type="checkbox"
                               id="aceiteLgpd"
                               style="margin-top: 4px; margin-left: 0;">

                        <label class="form-check-label"
                               for="aceiteLgpd">

                            Li e aceito os termos de uso e a política de privacidade.

                        </label>

                        <div class="invalid-feedback">
                            Você precisa aceitar os termos.
                        </div>

                    </div>

                    <button class="btn btn-success w-100 mt-4"
                            onclick="cadastrar()">

                        Criar Conta

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="login.js"></script>

</body>
</html>
