<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Index</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>


<body class="bg-light">

    <nav class="navbar navbar-expand-lg custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold" href="home.html">
                🎓 SchoolManager
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <div class="navbar-nav mx-auto">

                    <a class="nav-link active" href="alunos.html">
                        Alunos
                    </a>

                    <a class="nav-link" href="professores.html">
                        Professores
                    </a>

                    <a class="nav-link" href="disciplinas.html">
                        Disciplinas
                    </a>

                    <a class="nav-link" href="notas.html">
                        Notas
                    </a>

                </div>

                <button class="btn btn-danger"
                        onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <!-- LISTA -->

    <div class="container py-5">

        <div class="card shadow border-0">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2 class="mb-0">
                        Lista de Alunos
                    </h2>

                    <div>
                        <button id="btnNovoAluno"
                                class="btn btn-primary mb-3"
                                onclick="abrirFormulario()">
                            Novo Aluno
                        </button>

                    </div>

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">

                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Nascimento</th>
                                <th width="320">Ações</th>
                            </tr>

                        </thead>

                        <tbody id="tabelaAlunos"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- Modal -->

    <div class="modal fade" id="modalAluno" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow-lg">

                <div class="modal-header">
                    <h5 class="modal-title">Aluno</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="alunoId">

                    <div class="mb-2">
                        <label>Nome</label>
                        <input type="text" id="nome" class="form-control">

                        <div class="invalid-feedback">
                            Digite o nome do aluno
                        </div>
                    </div>

                    <div class="mb-2">
                        <label>CPF</label>

                        <input type="text"
                               id="cpf"
                               class="form-control"
                               placeholder="000.000.000-00"
                               maxlength="14">

                        <div class="invalid-feedback">
                            CPF inválido. Use o formato 000.000.000-00
                        </div>
                    </div>

                    <div class="mb-2">
                        <label>Data Nascimento</label>
                        <input type="date" id="dataNascimento" class="form-control">

                        <div class="invalid-feedback">
                            Informe a data de nascimento
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarAluno()">Salvar</button>
                </div>

            </div>
        </div>
    </div>


    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "login.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

    <!-- LOADING -->
    <div id="loadingScreen">

        <div class="spinner-border text-light"
             style="width: 4rem; height: 4rem;"
             role="status">
        </div>

    </div>

</body>
</html>
