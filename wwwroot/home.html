<!DOCTYPE html>
<html lang="pt-BR">
<head>
<title>Index</title>
<meta charset="UTF-8">
  
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-3">

        <span class="navbar-brand mb-0 h1">Escola do Joshi</span>

        <button class="btn btn-danger" onclick="logout()">Logout</button>

    </nav>

    <!-- LISTA -->

    <div class="container mt-5">

        <h2 class="mb-4">Lista de Alunos</h2>

        <button class="btn btn-primary mb-3" onclick="abrirFormulario()">Novo Aluno</button>
        <button class="btn btn-secondary mb-3" onclick="abrirDisciplina()">Nova Disciplina</button>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Nascimento</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaAlunos"></tbody>
        </table>

    </div>

    <!-- Modal -->

    <div class="modal fade" id="modalDisciplina">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Nova Disciplina</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" id="disciplinaNome" class="form-control mb-2" placeholder="Nome">
                    <input type="number" id="cargaHoraria" class="form-control" placeholder="Carga Horária">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarDisciplina()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAluno" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Aluno</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="alunoId">

                    <div class="mb-2">
                        <label>Nome</label>
                        <input type="text" id="nome" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>CPF</label>
                        <input type="text" id="cpf" class="form-control">
                    </div>

                    <div class="mb-2">
                        <label>Data Nascimento</label>
                        <input type="date" id="dataNascimento" class="form-control">
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarAluno()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNota">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Lançar Nota</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="alunoNotaId">

                    <div class="mb-2">
                        <label>Disciplina</label>
                        <select id="disciplinaSelect" class="form-control"></select>
                    </div>

                    <div class="mb-2">
                        <label>Nota</label>
                        <input type="number" id="nota" class="form-control">
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarNota()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalVerNotas">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Notas do Aluno</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Disciplina</th>
                                <th>Nota</th>
                                <th>Situação</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaNotas"></tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "index.html";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>
</html>
