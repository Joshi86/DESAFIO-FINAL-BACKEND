<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Disciplinas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg custom-navbar">

        <div class="container">

            <a class="navbar-brand fw-bold" href="home.html">
                🎓 SchoolManager
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <div class="navbar-nav mx-auto">

                    <a class="nav-link" href="alunos.html">
                        Alunos
                    </a>

                    <a class="nav-link" href="professores.html">
                        Professores
                    </a>

                    <a class="nav-link active" href="disciplinas.html">
                        Disciplinas
                    </a>

                    <a class="nav-link" href="notas.html">
                        Notas
                    </a>

                </div>

                <button class="btn btn-danger"
                        onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <div class="container py-5">

        <div class="card shadow border-0">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2 class="mb-0">Disciplinas</h2>

                    <button id="btnNovaDisciplina"
                            class="btn btn-primary"
                            onclick="abrirDisciplina()">
                        Nova Disciplina
                    </button>

                </div>

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Carga Horária</th>
                            </tr>
                        </thead>

                        <tbody id="tabelaDisciplinas"></tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- MODAL -->

    <div class="modal fade" id="modalDisciplina" tabindex="-1">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Nova Disciplina
                    </h5>

                    <button class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    <input type="text"
                           id="disciplinaNome"
                           class="form-control mb-3"
                           placeholder="Nome da disciplina">

                    <div class="invalid-feedback mb-2">
                        Digite um nome válido.
                    </div>

                    <input type="number"
                           id="cargaHoraria"
                           class="form-control"
                           placeholder="Carga horária">

                    <div class="invalid-feedback">
                        Digite uma carga horária válida.
                    </div>

                </div>

                <div class="modal-footer">

                    <button class="btn btn-success"
                            onclick="salvarDisciplina()">
                        Salvar
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="disciplinas.js"></script>

    <!-- LOADING -->
    <div id="loadingScreen" class="loading-screen d-none">

        <div class="text-center">

            <div class="spinner-border text-light" role="status"></div>

            <p class="mt-3 text-light">
                Carregando...
            </p>

        </div>

    </div>
</body>
</html>
